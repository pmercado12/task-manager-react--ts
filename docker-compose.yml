services:
  postgres:
    image: postgres:16-alpine
    #restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5
 
  backend:
    build: ./backend
    #restart: always
    environment:
      DATABASE_URL: postgresql://appuser:apppass@postgres:5432/appdb
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
 
  frontend:
    build: 
      context: ./
      args:
        VITE_API_URL: http://localhost:3000
    #restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: